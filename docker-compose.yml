version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: itops-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-itops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itops_dev}
      POSTGRES_DB: ${POSTGRES_DB:-itops_automation}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: itops-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
